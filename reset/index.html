<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Restablecer contraseña · Mach-T</title>
  <link rel="canonical" href="https://mach-t.app/reset">
  <link rel="icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .logo {
      font-size: 28px;
      font-weight: 900;
      color: #9F67FF;
      letter-spacing: -1.2px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.25;
      color: #f9fafb;
      text-align: center;
    }
    p.subtitle {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.55;
      text-align: center;
      margin-top: -8px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #C7C7CC;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: #1a1a25;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 14px 16px;
      color: #f9fafb;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: #7C3AED;
    }
    .field { display: flex; flex-direction: column; }
    .btn {
      background: #7C3AED;
      color: #fff;
      border: 0;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 15px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:hover:not(:disabled) { background: #6D28D9; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f9fafb;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }
    .btn.secondary:hover { background: rgba(255,255,255,0.10); }
    .status {
      font-size: 13px;
      line-height: 1.5;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
    }
    .status.error {
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.30);
      color: #FCA5A5;
      display: block;
    }
    .status.ok {
      background: rgba(34,197,94,0.10);
      border: 1px solid rgba(34,197,94,0.30);
      color: #86EFAC;
      display: block;
    }
    .footer {
      font-size: 12px;
      color: #4b5563;
      text-align: center;
      margin-top: 6px;
    }
    .hint {
      font-size: 12px;
      color: #6D6D70;
      margin-top: 4px;
    }
    .row { display: flex; gap: 10px; flex-direction: column; }
    @media (min-width: 480px) { .row { flex-direction: row; } .row > * { flex: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Mach-T</div>
    <h1 id="title">Restablecer contraseña</h1>
    <p class="subtitle" id="subtitle">Elige una nueva contraseña para tu cuenta.</p>

    <div id="status" class="status"></div>

    <form id="form" style="display:flex;flex-direction:column;gap:14px;">
      <div class="field">
        <label for="password">Nueva contraseña</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required placeholder="Mínimo 8 caracteres">
        <div class="hint">Usa al menos 8 caracteres.</div>
      </div>
      <div class="field">
        <label for="confirm">Confirmar contraseña</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" minlength="8" required placeholder="Repite tu contraseña">
      </div>
      <button id="submit" class="btn" type="submit">Guardar contraseña</button>
    </form>

    <div id="success" style="display:none;flex-direction:column;gap:12px;">
      <a class="btn" href="https://mach-t.app/open?to=login" style="text-decoration:none;text-align:center;">Abrir Mach-T</a>
      <a class="btn secondary" href="https://mach-t.app/">Volver al inicio</a>
    </div>

    <p class="footer">La red académica de tu universidad</p>
    <a href="https://www.instagram.com/___macht" target="_blank" rel="noopener" aria-label="Síguenos en Instagram" title="Síguenos en Instagram" style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;margin-top:14px;border-radius:12px;background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);color:#fff;text-decoration:none;box-shadow:0 4px 14px rgba(214,41,118,.35)"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1.2" fill="currentColor" stroke="none"/></svg></a>
  </div>

  <script src="/reset/check.js"></script>
  <script type="module" src="/reset/app.js"></script>
</body>
</html>
