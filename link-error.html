<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enlace de Mach-T</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 30px;
      font-weight: 900;
      color: #9F67FF;
      letter-spacing: -1.5px;
    }

    .icon {
      font-size: 48px;
      line-height: 1;
      margin: 4px 0;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      color: #f9fafb;
    }

    p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.7;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .btn {
      display: inline-block;
      background: #7C3AED;
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
      transition: background 0.15s;
    }
    .btn:hover { background: #6D28D9; }

    .footer {
      font-size: 12px;
      color: #4b5563;
      margin-top: -4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Mach-T</div>

    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Enlace expirado</h1>
    <p id="body">Los enlaces compartidos desde Mach-T son válidos por 2 horas para proteger tu privacidad.<br><br>Pídele al autor que comparta el documento nuevamente desde la app.</p>

    <div class="divider"></div>

    <a class="btn" href="https://play.google.com/store/apps/details?id=com.eseate.macht">
      Descargar Mach-T gratis
    </a>
    <p class="footer">La red académica de tu universidad</p>
  </div>

  <script>
    const messages = {
      expired: {
        icon: '⏳',
        title: 'Este enlace ha expirado',
        body: 'Los enlaces compartidos desde Mach-T son válidos por 2 horas para proteger tu privacidad.<br><br>Pídele al autor que comparta el documento nuevamente desde la app.',
      },
      notfound: {
        icon: '🔍',
        title: 'Enlace no encontrado',
        body: 'Este enlace no existe o ya fue eliminado.',
      },
      deleted: {
        icon: '🗑️',
        title: 'Documento no disponible',
        body: 'El autor eliminó este documento.',
      },
      invalid: {
        icon: '⚠️',
        title: 'Enlace inválido',
        body: 'Este enlace no tiene el formato correcto.',
      },
      error: {
        icon: '⚠️',
        title: 'Algo salió mal',
        body: 'Ocurrió un error al procesar el enlace. Inténtalo de nuevo en unos segundos.',
      },
    };

    const type = new URLSearchParams(location.search).get('error') || 'expired';
    const msg = messages[type] || messages.expired;

    document.getElementById('icon').textContent = msg.icon;
    document.getElementById('title').textContent = msg.title;
    document.getElementById('body').innerHTML = msg.body;
    document.title = msg.title + ' · Mach-T';
  </script>
</body>
</html>
