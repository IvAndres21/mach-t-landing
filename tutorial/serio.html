<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#09090D">
<title>Mach-T — Tutorial</title>
<link rel="icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090D;
  --surface: #13141B;
  --surface-2: #1A1C25;
  --elevated: #202331;
  --border: #2A2E3D;
  --primary: #7C3AED;
  --primary-light: #A78BFA;
  --primary-dark: #5B21B6;
  --primary-faded: rgba(124, 58, 237, 0.18);
  --primary-glow: rgba(124, 58, 237, 0.35);
  --text: #FAFAFC;
  --text-sec: #B3B8C9;
  --text-muted: #6B7186;
  --success: #22C55E;
  --success-faded: rgba(34, 197, 94, 0.15);
  --warning: #F59E0B;
  --warning-faded: rgba(245, 158, 11, 0.12);
  --error: #EF4444;
  --tab-active-bg: rgba(124, 58, 237, 0.16);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.4;
}
body {
  display: flex;
  justify-content: center;
  align-items: stretch;
}
#app {
  position: relative;
  width: 100vw;
  max-width: 460px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: var(--bg);
}

/* ─── BG orbs ─── */
.bg-orbs { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .4; }
.orb-1 { width: 320px; height: 320px; background: var(--primary); top: -120px; right: -80px; animation: orb1 16s ease-in-out infinite; }
.orb-2 { width: 280px; height: 280px; background: #3B82F6; bottom: -100px; left: -60px; animation: orb2 20s ease-in-out infinite; opacity: .25; }
@keyframes orb1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, 40px); } }
@keyframes orb2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, -30px); } }

/* ─── Selector inicial ─── */
#selector {
  position: absolute; inset: 0; z-index: 20;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 40px 24px;
  background: radial-gradient(ellipse at top, rgba(124,58,237,.18), transparent 60%), var(--bg);
  transition: opacity .5s ease;
}
#selector.hide { opacity: 0; pointer-events: none; }
.sel-logo {
  width: 88px; height: 88px; border-radius: 22px;
  background: linear-gradient(135deg, #A78BFA, #7C3AED 60%, #5B21B6);
  box-shadow: 0 10px 40px rgba(124,58,237,.35), 0 0 0 1px rgba(255,255,255,.05);
  margin-bottom: 18px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 44px; font-weight: 900; letter-spacing: -2px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.sel-title { font-size: 28px; font-weight: 800; letter-spacing: -.6px; margin-bottom: 6px; text-align: center; }
.sel-sub { color: var(--text-sec); font-size: 15px; margin-bottom: 36px; text-align: center; max-width: 320px; }
.sel-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 340px; }
.sel-card {
  background: linear-gradient(135deg, var(--surface), var(--surface-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 20px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  text-align: left;
  color: var(--text);
  font-family: inherit;
}
.sel-card:hover, .sel-card:active {
  transform: translateY(-2px);
  border-color: var(--primary);
  box-shadow: 0 12px 32px rgba(124,58,237,.22);
}
.sel-card-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--primary-faded); color: var(--primary-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sel-card-body h3 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.sel-card-body p { font-size: 13px; color: var(--text-sec); }
.sel-footer { margin-top: 28px; color: var(--text-muted); font-size: 12px; display: flex; gap: 6px; align-items: center; }

/* ─── Stage (pantalla de tutorial) ─── */
#stage {
  position: absolute; inset: 0; z-index: 10;
  opacity: 0; pointer-events: none;
  transition: opacity .5s ease;
  display: flex; flex-direction: column;
}
#stage.active { opacity: 1; pointer-events: auto; }

#screens {
  position: absolute; inset: 0;
  padding-top: calc(var(--safe-top) + 14px);
  padding-bottom: 140px;
  overflow: hidden;
  transform-origin: center top;
  transition: transform .85s cubic-bezier(.4, 0, .2, 1);
  will-change: transform;
}
.screen {
  position: absolute; inset: 0;
  padding-top: calc(var(--safe-top) + 14px);
  padding-bottom: 140px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  scroll-behavior: smooth;
}
.screen::-webkit-scrollbar { display: none; }

/* ─── Header flotante ─── */
.app-header {
  margin: 8px 14px 18px;
  background: rgba(19,20,27,.9);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.app-header .h-left { display: flex; flex-direction: column; }
.app-header .welcome { font-size: 13px; color: var(--text-sec); }
.app-header .name { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
.app-header .name-dot { color: var(--primary-light); font-size: 14px; }
.btn-pill {
  background: var(--primary);
  color: #fff;
  padding: 9px 16px;
  border-radius: 999px;
  font-weight: 700; font-size: 14px;
  display: flex; align-items: center; gap: 6px;
  border: none;
  box-shadow: 0 6px 18px rgba(124,58,237,.4);
}

.app-header-sub {
  margin: 8px 14px 14px;
  background: rgba(19,20,27,.85);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
}
.app-header-sub .back {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  flex-shrink: 0;
}
.app-header-sub .title { font-size: 17px; font-weight: 700; }

/* ─── Form ─── */
.form { padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 5px; display: block; }
.form-label .req { color: var(--primary-light); margin-left: 2px; }
.form-label .count { color: var(--text-muted); font-weight: 400; margin-left: 4px; }
.input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 14px;
  font-size: 15px; color: var(--text);
  font-family: inherit;
  width: 100%;
  display: flex; align-items: center; gap: 10px;
  min-height: 50px;
  transition: border-color .2s ease, background .2s ease;
}
.input.focused { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,.12); }
.input .placeholder { color: var(--text-muted); flex: 1; }
.input .value { flex: 1; color: var(--text); }
.input .chev { color: var(--text-muted); }
.input-icon { color: var(--text-muted); }

.input-row { display: flex; gap: 12px; }
.input-row > div { flex: 1; }

.textarea { min-height: 64px; align-items: flex-start; padding-top: 14px; }

/* ─── Chips ─── */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
.chip {
  background: var(--primary-faded);
  color: var(--primary-light);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 12px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
}

/* ─── Dropdowns de sugerencias ─── */
.suggest {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-top: 8px;
  overflow: hidden;
  box-shadow: 0 12px 28px rgba(0,0,0,.4);
}
.suggest--above {
  margin-top: 0;
  margin-bottom: 6px;
}
.suggest-item {
  padding: 13px 14px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item.highlight { background: var(--primary-faded); color: var(--primary-light); }

/* ─── Banner info ─── */
.banner {
  background: var(--primary-faded);
  border: 1px solid rgba(124,58,237,.3);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--primary-light);
  display: flex; gap: 10px; align-items: flex-start;
  line-height: 1.4;
}
.banner .ico { flex-shrink: 0; margin-top: 1px; }

/* ─── Warning mini ─── */
.warn {
  background: var(--warning-faded);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--warning);
  display: flex; gap: 8px; align-items: flex-start;
  line-height: 1.4;
}

/* ─── Dropzone ─── */
.dropzone {
  border: 2px dashed var(--primary);
  background: rgba(124,58,237,.06);
  border-radius: 16px;
  padding: 28px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  text-align: center;
}
.dropzone.filled { border-style: solid; border-color: var(--success); background: rgba(34,197,94,.05); }
.dropzone-icon {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.dropzone.filled .dropzone-icon { color: var(--success); background: rgba(34,197,94,.15); border-radius: 50%; }
.dropzone-text { font-weight: 600; color: var(--primary-light); font-size: 14px; }
.dropzone.filled .dropzone-text { color: var(--success); }
.dropzone-hint { font-size: 11px; color: var(--text-muted); }

.file-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  display: flex; align-items: center; gap: 12px;
}
.file-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--error); color: #fff;
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.file-name { font-size: 14px; font-weight: 600; color: var(--text); }
.file-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ─── Checkbox ─── */
.check-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
}
.check-row.on { border-color: var(--primary); background: rgba(124,58,237,.08); }
.check {
  width: 20px; height: 20px; border: 2px solid var(--text-muted); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .2s ease;
}
.check.on { background: var(--primary); border-color: var(--primary); }
.check.on::after {
  content: '✓'; color: #fff; font-size: 13px; font-weight: 800;
}
.check-body { flex: 1; }
.check-title { font-size: 14px; font-weight: 600; color: var(--text); }
.check-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

/* ─── Botón submit ─── */
.submit {
  background: var(--primary);
  color: #fff;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  font-size: 16px; font-weight: 700;
  border: none;
  box-shadow: 0 8px 24px rgba(124,58,237,.35);
  margin-top: 4px;
}
.submit.ghost {
  background: transparent;
  box-shadow: none;
  color: var(--text-sec);
}

/* ─── Dropdown overlay ─── */
.sheet {
  position: absolute;
  left: 12px; right: 12px;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 8px;
  box-shadow: 0 20px 48px rgba(0,0,0,.5);
  z-index: 3;
}
.sheet-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); font-weight: 700;
  padding: 10px 12px 6px;
}
.sheet-item {
  padding: 13px 12px;
  font-size: 15px;
  display: flex; align-items: center; gap: 12px;
  border-radius: 10px;
}
.sheet-item .sheet-ico { color: var(--primary-light); }
.sheet-item.selected { background: var(--primary-faded); color: var(--primary-light); }

/* ─── Modal estilo Android seleccionar archivo ─── */
.modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.65);
  display: flex; align-items: center; justify-content: center;
  padding: 0 20px;
  z-index: 6;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-sel {
  background: #fff;
  color: #111;
  border-radius: 20px;
  width: 100%; max-width: 340px;
  padding: 22px 20px 14px;
}
.modal-sel-title { font-size: 18px; font-weight: 500; color: #222; margin-bottom: 16px; }
.modal-sel-list { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; padding-bottom: 8px; }
.modal-sel-btn {
  padding: 12px 10px;
  font-size: 13px; font-weight: 700; letter-spacing: .8px;
  color: #05846a;
  text-transform: uppercase;
  text-align: right;
}

/* ─── Toggle horario ─── */
.toggle-seg {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 4px;
  display: flex;
}
.toggle-opt {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  color: var(--text-sec);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-align: center;
}
.toggle-opt.on { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(124,58,237,.35); }

/* ─── Time picker ─── */
.timepicker {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 10px;
  display: flex; gap: 8px; align-items: stretch;
}
.tp-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tp-col-title { font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
.tp-wheel { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tp-faded { color: var(--text-muted); font-size: 12px; }
.tp-current { color: var(--text); font-size: 18px; font-weight: 700; padding: 6px 0; border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); width: 80px; text-align: center; }
.tp-chev { color: var(--text-muted); font-size: 14px; }

/* ─── Day chips ─── */
.daychips { display: flex; flex-wrap: wrap; gap: 6px; }
.daychip {
  padding: 7px 14px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px; font-weight: 600;
  color: var(--text-sec);
}
.daychip.on { background: var(--primary); border-color: var(--primary); color: #fff; }
.daychip.off { opacity: .5; }

/* ─── Horario de clases ─── */
.class-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.class-row .day-badge {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.class-row.empty .day-badge { background: var(--elevated); color: var(--text-muted); }
.class-row-main { flex: 1; font-size: 13px; color: var(--text); }
.class-row-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* ─── Photo grid ─── */
.photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.photo-slot {
  width: 80px; height: 80px;
  border-radius: 12px;
  border: 2px dashed var(--primary);
  background: rgba(124,58,237,.06);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
  font-size: 22px;
  position: relative;
}
.photo-slot.has-img {
  border-style: solid;
  border-color: var(--border);
  background: var(--surface);
  overflow: hidden;
}
.photo-slot .pri-badge {
  position: absolute; top: 4px; left: 4px;
  background: var(--primary); color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 2px 5px; border-radius: 4px;
}
.photo-slot .x-badge {
  position: absolute; top: 4px; right: 4px;
  background: rgba(0,0,0,.7); color: #fff;
  font-size: 10px; width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* ─── Feed cards (Inicio / Tienda) ─── */
.feed-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin: 0 14px 12px;
  overflow: hidden;
}
.feed-card-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px;
}
.badge-mini {
  background: var(--primary-faded); color: var(--primary-light);
  font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
}
.badge-mini.green { background: var(--success-faded); color: var(--success); }
.badge-mini.warn { background: var(--warning-faded); color: var(--warning); }
.feed-card-body { padding: 0 12px 12px; }
.feed-card-body .title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.feed-card-body .sub { font-size: 13px; color: var(--text-sec); margin-bottom: 10px; }
.feed-card-img {
  width: 100%; aspect-ratio: 4/3;
  background: linear-gradient(135deg, #555, #333);
  border-radius: 10px;
}
.feed-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tag {
  font-size: 11px; padding: 3px 8px; border-radius: 999px;
  background: var(--primary-faded); color: var(--primary-light); font-weight: 600;
}
.feed-card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); }
.feed-meta-actions { display: flex; gap: 10px; }

/* ─── Store product card ─── */
.prod-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin: 0 14px 12px;
  overflow: hidden;
  display: flex;
}
.prod-card-info { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
.prod-card-title { font-size: 14px; font-weight: 700; }
.prod-card-sub { font-size: 11px; color: var(--text-sec); }
.prod-card-price {
  display: inline-block;
  background: var(--primary-faded); color: var(--primary-light);
  font-size: 14px; font-weight: 700; padding: 3px 8px; border-radius: 8px;
  align-self: flex-start; margin-top: 4px;
}
.prod-card-img {
  width: 100px;
  background: linear-gradient(135deg, #aaa, #666);
}

/* ─── Tab bar ─── */
.tabbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(16,17,26,.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 8px 12px calc(10px + var(--safe-bottom));
  display: flex; justify-content: space-around;
  z-index: 4;
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 6px;
  color: var(--text-muted);
  font-size: 10px; font-weight: 600;
  min-width: 48px;
}
.tab-item.active { color: var(--primary-light); }
.tab-item.active .tab-pill {
  background: var(--tab-active-bg);
}
.tab-pill {
  width: 46px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 999px;
}

/* ─── Teclado simulado ─── */
.keyboard {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: #2d2d33;
  padding: 10px 6px 18px;
  z-index: 3;
  animation: keybIn .3s ease;
  pointer-events: none;
}
@keyframes keybIn {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.keyboard.hide { display: none; }
.keyb-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 6px; }
.keyb-key {
  flex: 1; max-width: 32px;
  height: 38px;
  background: #5a5a62;
  border-radius: 6px;
  color: #fff;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
}

/* ─── Dedo ─── */
.finger {
  position: absolute;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  border: 2px solid rgba(255,255,255,.7);
  box-shadow: 0 0 0 0 rgba(255,255,255,.4), 0 0 18px rgba(124,58,237,.55);
  pointer-events: none;
  z-index: 50;
  transform: translate(-50%, -50%);
  transition: left .5s cubic-bezier(.4,0,.2,1), top .5s cubic-bezier(.4,0,.2,1);
  opacity: 0;
}
.finger.visible { opacity: 1; }
.finger.tap { animation: tap .45s ease; }
@keyframes tap {
  0%   { transform: translate(-50%, -50%) scale(1); }
  50%  { transform: translate(-50%, -50%) scale(.7); box-shadow: 0 0 0 18px rgba(124,58,237,.0); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

.ripple {
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(124,58,237,.5);
  pointer-events: none;
  z-index: 49;
  transform: translate(-50%, -50%);
  animation: ripple .7s ease-out forwards;
}
@keyframes ripple {
  0%   { width: 12px; height: 12px; opacity: .9; }
  100% { width: 80px; height: 80px; opacity: 0; }
}

/* ─── Subtitle ─── */
.subtitle {
  position: absolute;
  left: 14px; right: 14px;
  background: linear-gradient(135deg, rgba(20,14,40,.96), rgba(9,9,13,.96));
  backdrop-filter: blur(14px);
  border: 2px solid rgba(167,139,250,.55);
  border-radius: 18px;
  padding: 16px 18px;
  z-index: 30;
  font-size: 17px;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.38;
  font-weight: 600;
  letter-spacing: .1px;
  text-shadow: 0 2px 6px rgba(0,0,0,.65);
  transition: opacity .45s cubic-bezier(.4,0,.2,1), transform .45s cubic-bezier(.4,0,.2,1);
  box-shadow:
    0 0 0 4px rgba(124,58,237,.18),
    0 18px 44px rgba(0,0,0,.65),
    0 0 28px rgba(124,58,237,.4);
  bottom: calc(30px + var(--safe-bottom));
  top: auto;
}
.subtitle--top    { top: calc(30px + var(--safe-top)); bottom: auto; }
.subtitle--mid-top    { top: 32%; bottom: auto; }
.subtitle--mid-bottom { top: auto; bottom: 36%; }
.subtitle--bottom { bottom: calc(30px + var(--safe-bottom)); top: auto; }
.tap-zone {
  position: absolute;
  top: 0; bottom: 0;
  width: 28%;
  z-index: 28;
  background: transparent;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background-color .18s ease;
}
.tap-zone--left  { left: 0; }
.tap-zone--right { right: 0; }
.tap-zone.pulse  { background-color: rgba(167,139,250,.14); }
.subtitle.leaving { opacity: 0; transform: translateY(8px); }
.subtitle.entering { opacity: 0; transform: translateY(10px); }
.subtitle b {
  color: #E9DDFF;
  font-weight: 800;
  background: linear-gradient(180deg, rgba(167,139,250,.35), rgba(124,58,237,.28));
  padding: 1px 6px;
  border-radius: 6px;
  box-shadow: inset 0 0 0 1px rgba(167,139,250,.35);
}

/* ─── Intro / Outro ─── */
.intro-outro {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 40px 24px;
  background: radial-gradient(ellipse at center, rgba(124,58,237,.25), transparent 60%), var(--bg);
  text-align: center;
  z-index: 25;
}
.intro-logo {
  width: 84px; height: 84px; border-radius: 22px;
  background: linear-gradient(135deg, #A78BFA, #7C3AED 60%, #5B21B6);

  margin-bottom: 20px;

  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 42px; font-weight: 900;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  letter-spacing: -2px;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.intro-eyebrow {

  return `<div class="tabbar">${items.map(it => `

      <span>${it.l}</span>

function timePicker(lbl1, lbl2, v1, v2, titled = false) {
  return `
    ${titled ? `<div style="font-size:12px; color:var(--text-muted); text-align:center; margin:-4px 0;">¿De qué hora a qué hora puedes vender?</div>` : ''}
    <div class="timepicker">
      <div class="tp-col">
        <div class="tp-col-title">${lbl1}</div>
        <div class="tp-chev">▲</div>
        <div class="tp-faded">7:30 AM</div>
        <div class="tp-current">${v1}</div>
        <div class="tp-faded">8:30 AM</div>
        <div class="tp-chev">▼</div>
      </div>
      <div class="tp-col">
        <div class="tp-col-title">${lbl2}</div>
        <div class="tp-chev">▲</div>
        <div class="tp-faded">5:30 PM</div>
        <div class="tp-current">${v2}</div>
        <div class="tp-faded">6:30 PM</div>
        <div class="tp-chev">▼</div>
      </div>
    </div>
  `;
}

function renderHorarioClases(s) {
  const diasActivos = s.diasU;
  return `
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div style="font-size:13px; font-weight:600; color:var(--text-sec);">Horario de clases</div>
        ${s.horarioGuardado ? `<span style="font-size:12px; color:var(--primary-light); font-weight:600; background:var(--primary-faded); padding:4px 10px; border-radius:999px;">✎ Editar</span>` : `<span style="font-size:12px; color:var(--warning); font-weight:600;">× Cancelar</span>`}
      </div>
      <div style="font-size:11px; color:var(--text-muted); margin-bottom:8px;">Marca cuándo tienes clase · los compradores verán tus horas libres</div>
      ${s.horarioGuardado ? `
        <div style="background:var(--surface); border:1px solid var(--primary); border-radius:14px; padding:12px;">
          <div style="display:flex; align-items:center; gap:6px; color:var(--primary-light); font-size:13px; font-weight:600; margin-bottom:6px;">✓ Horario guardado desde tu perfil</div>
          <div style="font-size:13px; color:var(--text-sec); line-height:1.8;">
            <b>Lun</b> &nbsp;9:00 AM &nbsp;→ 10:00 AM<br>
            <b>Mié</b> &nbsp;8:00 AM &nbsp;→ 10:00 AM
          </div>
        </div>
      ` : diasActivos.map(d => {
        const bloques = s.bloques[d] || [];
        const expandido = s.claseExpandida === d;
        return `
        <div class="class-row ${bloques.length === 0 && !expandido ? 'empty' : ''}" style="${expandido ? 'flex-direction:column; align-items:stretch;' : ''}">
          ${!expandido ? `
            <div class="day-badge">${d}</div>
            <div class="class-row-main">
              ${bloques.length ? `${bloques.length} bloque${bloques.length === 1 ? '' : 's'} de clase` : 'Sin clases — disponible todo el día'}
            </div>
            <span class="tp-chev">${ico.chev}</span>
          ` : `
            <div style="display:flex; align-items:center; gap:10px; width:100%;">
              <div class="day-badge">${d}</div>
              <div style="flex:1; font-size:13px;">1 bloque de clase</div>
              <span class="tp-chev">▲</span>
            </div>
            <div style="font-size:11px; color:var(--text-muted); text-align:center; margin-top:10px;">¿A qué hora es la clase?</div>
            ${timePicker('ENTRA', 'SALE', '8:00 AM', '10:00 AM')}
            <div style="display:flex; gap:8px; margin-top:10px;">
              <button class="submit ghost" style="margin:0; padding:10px; border:1px solid var(--border); border-radius:12px; flex:1;">Cancelar</button>
              <button class="submit" style="margin:0; padding:10px; flex:1;">Agregar</button>
            </div>
          `}
        </div>
        ${bloques.length && !expandido ? `<div style="background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px; font-size:13px;">
          <span style="color:var(--primary-light);">◉</span>
          <span>${bloques[0].entra} → ${bloques[0].sale}</span>
          <span style="margin-left:auto; color:var(--error);">×</span>
        </div>` : ''}
      `;
      }).join('') + `<div style="margin-top:-4px;"><div style="font-size:13px; color:var(--primary-light); text-align:center; padding:10px; background:var(--primary-faded); border-radius:10px;">+ Agregar bloque de clase</div></div>`}
    </div>
  `;
}

// ═════════════════════════════════════════════════════════════════
// Runner
// ═════════════════════════════════════════════════════════════════
let currentSteps = null;
let currentTutorial = null; // 'doc' | 'prod'
let stepIdx = 0;
let timer = null;
let tapTimer = null;
let subTimer = null;
let fingerTimer = null;
let lastScreenType = null;
let lastSubtitle = '';
let lastSubPos = '';
let currentScale = 1, currentTx = 0, currentTy = 0;

// Duración basada en cantidad de texto: 1.6s base + 55ms por carácter
function computeDuration(text) {
  const plain = (text || '').replace(/<[^>]+>/g, '').trim();
  return Math.max(3200, Math.min(10000, 1600 + plain.length * 55));
}

function startTutorial(which) {
  currentTutorial = which;
  currentSteps = which === 'doc' ? STEPS_DOC : STEPS_PROD;
  stepIdx = 0;
  lastScreenType = null;
  lastSubtitle = '';
  lastSubPos = '';
  currentScale = 1; currentTx = 0; currentTy = 0;
  document.getElementById('selector').classList.add('hide');
  document.getElementById('stage').classList.add('active');
  document.getElementById('outro').style.display = 'none';
  resetZoom(false);
  runStep();
}

function runStep() {
  clearTimeout(timer);
  clearTimeout(tapTimer);
  clearTimeout(fingerTimer);
  clearTimeout(subTimer);
  if (stepIdx >= currentSteps.length) {
    showOutro();
    return;
  }
  const step = currentSteps[stepIdx];

  if (step.intro) {
    showIntro(step);
    timer = setTimeout(() => { stepIdx++; hideIntro(); runStep(); }, step.dur);
    return;
  }

  if (step.outro) {
    showOutro();
    return;
  }

  const screens = document.getElementById('screens');
  const screen = document.getElementById('persistent-screen');

  // Renderizar HTML (reutiliza el mismo contenedor)
  const isNewScreen = step.screenType !== lastScreenType;
  if (isNewScreen) {
    // Reset zoom instantáneo al cambiar de pantalla
    resetZoom(false);
  }
  screen.innerHTML = step.render();
  // Eliminar overlay previo
  const prevOverlay = screens.querySelector('.step-overlay');
  if (prevOverlay) prevOverlay.remove();
  if (step.overlay) {
    const overlayDiv = document.createElement('div');
    overlayDiv.className = 'step-overlay';
    overlayDiv.innerHTML = step.overlay;
    screens.appendChild(overlayDiv);
  }
  lastScreenType = step.screenType;

  // Scroll al punto deseado
  const targetScroll = step.scrollTo || 0;
  screen.scrollTo({ top: targetScroll, behavior: isNewScreen ? 'auto' : 'smooth' });

  // Calcular duración del paso por longitud de texto
  const dur = step.dur || computeDuration(step.subtitle);

  // Esperar a que el scroll termine antes de aplicar el zoom
  const zoomDelay = isNewScreen ? 50 : 600;
  setTimeout(() => applyZoom(step.zoom), zoomDelay);

  // Subtítulo con fade (posición dinámica)
  updateSubtitle(step.subtitle || '', step.subPos || 'bottom');

  // Dedo aparece tras zoom estable; tap ocurre cerca del final del paso
  const fingerSettle = zoomDelay + 900;
  const tapAt = step.tapAt != null ? step.tapAt : (dur - 1100);
  updateFinger(step, fingerSettle, tapAt);

  // Avanzar al siguiente paso
  timer = setTimeout(() => {
    stepIdx++;
    runStep();
  }, dur);
}

function updateSubtitle(text, pos) {
  const sub = document.getElementById('subtitle');
  const posCls = 'subtitle--' + (pos || 'bottom');
  if (lastSubtitle === text && lastSubPos === posCls) return;
  lastSubtitle = text;
  lastSubPos = posCls;
  sub.classList.add('leaving');
  subTimer = setTimeout(() => {
    sub.innerHTML = text;
    sub.classList.remove('subtitle--top', 'subtitle--mid-top', 'subtitle--mid-bottom', 'subtitle--bottom');
    sub.classList.add(posCls);
    sub.classList.remove('leaving');
    sub.classList.add('entering');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => sub.classList.remove('entering'));
    });
  }, 250);
}

function updateFinger(step, settle, tapAt) {
  const finger = document.getElementById('finger');
  if (!step.finger) {
    finger.classList.remove('visible');
    return;
  }
  fingerTimer = setTimeout(() => {
    const target = document.querySelector(step.finger);
    if (!target) { finger.classList.remove('visible'); return; }
    const rect = target.getBoundingClientRect();
    const appRect = document.getElementById('app').getBoundingClientRect();
    const x = rect.left + rect.width / 2 - appRect.left;
    const y = rect.top + rect.height / 2 - appRect.top;
    finger.style.left = x + 'px';
    finger.style.top = y + 'px';
    finger.classList.add('visible');
    if (tapAt != null) {
      const tapDelay = Math.max(200, tapAt - settle);
      tapTimer = setTimeout(() => {
        finger.classList.add('tap');
        spawnRipple(x, y);
        if (target.classList.contains('check-row')) {
          target.classList.add('on');
          const check = target.querySelector('.check');
          if (check) check.classList.add('on');
        }
        setTimeout(() => finger.classList.remove('tap'), 500);
      }, tapDelay);
    }
  }, settle);
}

// ═════════════════════════════════════════════════════════════════
// Zoom — usa translate + scale para que la animación sea fluida
// y el elemento enfocado se quede en su posición visible.
// ═════════════════════════════════════════════════════════════════
function applyZoom(zoom) {
  const screens = document.getElementById('screens');
  if (!zoom || !zoom.target) { resetZoom(true); return; }
  const target = screens.querySelector(zoom.target);
  if (!target) { resetZoom(true); return; }

  // Posición visible actual del target
  const scrRect = screens.getBoundingClientRect();
  const tgtRect = target.getBoundingClientRect();
  const visLeft = tgtRect.left - scrRect.left;
  const visCx = visLeft + tgtRect.width / 2;
  const visCy = tgtRect.top + tgtRect.height / 2 - scrRect.top;

  // Coordenadas naturales (deshacer transform actual)
  const natLeft = (visLeft - currentTx) / currentScale;
  const natWidth = tgtRect.width / currentScale;
  const natCx = (visCx - currentTx) / currentScale;
  const natCy = (visCy - currentTy) / currentScale;

  // Ancla vertical: mantener visible, apartado del subtítulo.
  const subTop = scrRect.height - 160;
  let anchorVisY = visCy;
  if (visCy > subTop) {
    anchorVisY = subTop - 40;
  }

  const newScale = zoom.scale;
  let newTx = visCx - natCx * newScale;
  const newTy = anchorVisY - natCy * newScale;

  // Clamp horizontal: el target no debe salirse del viewport.
  // Si al escalar se sale por la izquierda, pegarlo al lado izquierdo con padding.
  // Si se sale por la derecha, pegarlo al lado derecho con padding.
  const padding = 16;
  const scaledLeft = natLeft * newScale + newTx;
  const scaledRight = scaledLeft + natWidth * newScale;
  if (scaledLeft < padding) {
    newTx += padding - scaledLeft;
  } else if (scaledRight > scrRect.width - padding) {
    newTx -= scaledRight - (scrRect.width - padding);
    // Si después del ajuste derecho se sale por la izquierda (target más ancho
    // que el viewport), priorizar la izquierda.
    const reLeft = natLeft * newScale + newTx;
    if (reLeft < padding) newTx += padding - reLeft;
  }

  currentScale = newScale; currentTx = newTx; currentTy = newTy;
  screens.style.transform = `translate(${newTx}px, ${newTy}px) scale(${newScale})`;
}

function resetZoom(animate) {
  const screens = document.getElementById('screens');
  if (!animate) {
    const prevTransition = screens.style.transition;
    screens.style.transition = 'none';
    screens.style.transform = 'translate(0, 0) scale(1)';
    currentScale = 1; currentTx = 0; currentTy = 0;
    void screens.offsetHeight; // forzar reflow
    screens.style.transition = prevTransition || '';
  } else {
    screens.style.transform = 'translate(0, 0) scale(1)';
    currentScale = 1; currentTx = 0; currentTy = 0;
  }
}

function spawnRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  document.getElementById('app').appendChild(r);
  setTimeout(() => r.remove(), 800);
}

function showIntro(step) {
  document.getElementById('intro-title').textContent = step.title;
  document.getElementById('intro-sub').textContent = step.sub;
  document.getElementById('intro').style.display = 'flex';
  document.getElementById('subtitle').style.display = 'none';
  document.getElementById('persistent-screen').innerHTML = '';
  lastScreenType = null;
  resetZoom(false);
  document.getElementById('finger').classList.remove('visible');
}

function hideIntro() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('subtitle').style.display = 'block';
}

function showOutro() {
  const step = currentSteps[currentSteps.length - 1];
  document.getElementById('outro-title').textContent = step.title || '¡Listo!';
  document.getElementById('outro-sub').textContent = step.sub || '';
  document.getElementById('outro').style.display = 'flex';
  document.getElementById('subtitle').style.display = 'none';
  document.getElementById('finger').classList.remove('visible');
  document.getElementById('intro').style.display = 'none';
  resetZoom(true);
}

// ═════════════════════════════════════════════════════════════════
// Listeners
// ═════════════════════════════════════════════════════════════════
document.querySelectorAll('[data-start]').forEach(btn => {
  btn.addEventListener('click', () => startTutorial(btn.dataset.start));
});

document.getElementById('outro-replay').addEventListener('click', () => {
  document.getElementById('outro').style.display = 'none';
  document.getElementById('subtitle').style.display = 'block';
  stepIdx = 0;
  runStep();
});

document.getElementById('outro-other').addEventListener('click', () => {
  startTutorial(currentTutorial === 'doc' ? 'prod' : 'doc');
});

document.getElementById('outro-home').addEventListener('click', () => {
  document.getElementById('stage').classList.remove('active');
  document.getElementById('outro').style.display = 'none';
  document.getElementById('subtitle').style.display = 'block';
  document.getElementById('selector').classList.remove('hide');
  clearTimeout(timer);
  clearTimeout(tapTimer);
});

// ═════════════════════════════════════════════════════════════════
// Navegación manual: tocar izquierda = atrás, derecha = adelante
// ═════════════════════════════════════════════════════════════════
function jumpToStep(newIdx) {
  if (!currentSteps) return;
  const target = Math.max(0, Math.min(newIdx, currentSteps.length - 1));
  if (target === stepIdx) return;
  clearTimeout(timer);
  clearTimeout(tapTimer);
  clearTimeout(fingerTimer);
  clearTimeout(subTimer);
  // Forzar re-render limpio
  lastScreenType = null;
  lastSubtitle = '';
  lastSubPos = '';
  // Cerrar overlays si están abiertos
  const intro = document.getElementById('intro');
  const outro = document.getElementById('outro');
  if (intro.style.display !== 'none') intro.style.display = 'none';
  if (outro.style.display !== 'none') {
    outro.style.display = 'none';
    document.getElementById('subtitle').style.display = 'block';
  }
  resetZoom(false);
  stepIdx = target;
  runStep();
}

function pulseZone(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('pulse');
  setTimeout(() => el.classList.remove('pulse'), 220);
}

document.getElementById('tap-prev').addEventListener('click', () => {
  if (!document.getElementById('stage').classList.contains('active')) return;
  pulseZone('tap-prev');
  jumpToStep(stepIdx - 1);
});
document.getElementById('tap-next').addEventListener('click', () => {
  if (!document.getElementById('stage').classList.contains('active')) return;
  pulseZone('tap-next');
  jumpToStep(stepIdx + 1);
});
</script>
